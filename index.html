<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>igor.wtf</title>
<link rel="icon" type="image/png" sizes="96x96" href="/Memoji.png">
<link rel="apple-touch-icon" sizes="180x180" href="/Memoji.png">
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;background:#f5f5f5}
  .viewport{width:100vw;height:100vh;overflow:hidden;position:relative;transition:filter .5s cubic-bezier(.22,.61,.36,1)}
  .viewport.blurred{filter:blur(16px) brightness(.6);pointer-events:none}
  .edge-fade{position:absolute;top:0;width:90px;height:100%;z-index:10;pointer-events:none}
  .edge-fade.left{left:0;background:linear-gradient(to right,rgba(245,245,245,.65),transparent)}
  .edge-fade.right{right:0;background:linear-gradient(to left,rgba(245,245,245,.65),transparent)}
  .grid{display:grid;gap:5px;position:absolute;top:50%;will-change:transform;transition:grid-template-columns 1.1s cubic-bezier(.22,.61,.36,1),grid-template-rows 1.1s cubic-bezier(.22,.61,.36,1)}
  .cell{border-radius:10px;overflow:hidden;position:relative;background:#e0e0e0;min-width:0;min-height:0;display:flex;flex-direction:column;justify-content:space-between;padding:12px 15px;transition:background .5s ease}
  .cell:hover{background:#ebff3e}
  .cell.clickable{cursor:pointer}
  .cell:not(.clickable){cursor:default}
  .cell-hover-img{position:absolute;inset:0;opacity:0;transition:opacity .5s ease;pointer-events:none;z-index:1}
  .cell-hover-img img{width:100%;height:100%;object-fit:cover}
  .cell:hover .cell-hover-img{opacity:1}
  .cell-top{font-family:'Hanken Grotesk',sans-serif;font-weight:700;font-size:10px;color:#333;letter-spacing:.2px;overflow:hidden;text-overflow:ellipsis;flex-shrink:0;position:relative;z-index:2;white-space:pre-line;line-height:1.3}
  .cell-bottom{display:flex;justify-content:space-between;align-items:flex-end;flex-shrink:0;margin-top:auto;position:relative;z-index:2}
  .cell-tag{font-family:'Hanken Grotesk',sans-serif;font-weight:400;font-size:9px;color:#aaa;letter-spacing:.2px}
  .cell-likes{display:flex;align-items:center;gap:3px;font-family:'Hanken Grotesk',sans-serif;font-weight:400;font-size:9px;color:#aaa}
  .cell-likes-pill{background:transparent;border-radius:20px;padding:0;transition:background .3s ease,color .3s ease,padding .3s ease}
  .cell:hover .cell-likes-pill{background:#fff;color:#333;box-shadow:0 2px 8px rgba(0,0,0,.08);padding:4px 8px}
  .cell-heart{cursor:pointer;font-size:11px;line-height:1;transition:transform .2s ease,color .2s ease;user-select:none}
  .cell-heart:hover{transform:scale(1.3)}
  .cell-heart.liked{color:#ff3b5c}
  .cell-thumb-wrap{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(1.33);width:30%;aspect-ratio:1;opacity:0;transition:opacity .1s ease,transform .4s cubic-bezier(.22,.61,.36,1);pointer-events:none;z-index:2}
  .cell:hover .cell-thumb-wrap{opacity:1;transform:translate(-50%,-50%) scale(1);transition:opacity .3s ease,transform .7s cubic-bezier(.22,.61,.36,1)}
  .cell-thumb-wrap img{width:100%;height:100%;object-fit:cover;border-radius:5px;display:block}

  .lightbox-backdrop{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .45s cubic-bezier(.22,.61,.36,1);background:rgba(0,0,0,0)}
  .lightbox-backdrop.open{opacity:1;pointer-events:all;background:rgba(180,180,180,.35)}

  .lb-close{position:fixed;top:24px;right:24px;z-index:200;width:56px;height:56px;border-radius:50%;border:none;background:#fff;font-size:22px;font-weight:300;color:#000;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 30px rgba(0,0,0,.12);transition:background .2s,opacity .3s,transform .2s;opacity:0;pointer-events:none}
  .lightbox-backdrop.open .lb-close{opacity:1;pointer-events:all}
  .lb-close:hover{background:#ebff3e;transform:scale(1.05)}

  .lb-content{
    position:absolute;top:50%;left:48%;transform:translate(-50%,-50%);
    display:flex;gap:20px;align-items:center;
    max-width:90vw;max-height:85vh;width:980px;
  }

  /* Info wrapper stays in flex flow; the actual info box moves via transform */
  .lb-info-wrapper{
    flex-shrink:0;width:300px;max-width:35vw;
    position:relative;
  }
  .lb-info{
    width:100%;
    background:#ebff3e;border-radius:16px;
    box-shadow:0 20px 80px rgba(0,0,0,.18);
    cursor:grab;user-select:none;z-index:150;
    opacity:0;transform:translateY(30px);
    transition:opacity .6s cubic-bezier(.22,.61,.36,1) .1s, transform .6s cubic-bezier(.22,.61,.36,1) .1s;
    position:relative;
    display:flex;flex-direction:column;
  }
  .lightbox-backdrop.open .lb-info{opacity:1;transform:translateY(0);}
  .lb-info.dragging{cursor:grabbing;transition:none;}
  .lb-info::-webkit-scrollbar{width:0}

  .lb-info-scroll{
    padding:28px 24px 0;overflow-y:auto;flex:1;min-height:0;
  }
  .lb-info-scroll::-webkit-scrollbar{width:0}

  /* Fade overlay sits at the bottom of .lb-info, outside the scroll */
  .lb-info-fade{
    position:absolute;bottom:0;left:0;right:0;height:40px;
    background:linear-gradient(to bottom, rgba(235,255,62,0), rgba(235,255,62,1));
    pointer-events:none;border-radius:0 0 16px 16px;
    opacity:0;transition:opacity .2s ease;
  }
  .lb-info-fade.visible{opacity:1}

  /*
    Line-height values:
    - .lb-info-name:         font-size: 11px,  line-height: 1.2
    - .lb-info-desc:         font-size: 14px,  line-height: 1.25
    - .lb-info-credit-label: font-size: 10px,  line-height: 1.2
    - .lb-info-credit-value: font-size: 11px,  line-height: 1.3
    - .lb-info-divider:      margin: 14px 0
    - .lb-info-credit:       margin-bottom: 8px
  */
  .lb-info-name{font-family:'Hanken Grotesk',sans-serif;font-weight:400;font-size:11px;color:#888;letter-spacing:.5px;margin-bottom:6px;line-height:1.2}
  .lb-info-desc{font-family:'Hanken Grotesk',sans-serif;font-weight:400;font-size:14px;line-height:1.25;color:#111;margin-bottom:12px}
  .lb-info-divider{width:100%;height:1px;background:#000;margin:14px 0}
  .lb-info-credit{margin-bottom:8px}
  .lb-info-credit-label{font-family:'Hanken Grotesk',sans-serif;font-weight:400;font-size:10px;color:#888;letter-spacing:.3px;margin-bottom:1px;line-height:1.2}
  .lb-info-credit-value{font-family:'Hanken Grotesk',sans-serif;font-weight:400;font-size:11px;color:#888;line-height:1.3}
  .lb-info-credit-value a{color:#888;text-decoration:underline;text-underline-offset:2px;transition:color .2s}
  .lb-info-credit-value a:hover{color:#111}
  .lb-info-credit:last-child{margin-bottom:24px}

  .lb-images{
    flex:1;min-width:0;max-height:85vh;
    background:#fff;border-radius:20px;overflow-y:auto;overflow-x:hidden;
    padding:8px;box-shadow:0 30px 100px rgba(0,0,0,.15);
    opacity:0;transform:scale(.97);
    transition:opacity .5s cubic-bezier(.22,.61,.36,1), transform .5s cubic-bezier(.22,.61,.36,1);
  }
  .lightbox-backdrop.open .lb-images{opacity:1;transform:scale(1);}
  .lb-images::-webkit-scrollbar{width:0}

  .lb-img-full{width:100%;border-radius:12px;margin-bottom:8px;background:#f0f0f0;overflow:hidden;position:relative}
  .lb-img-full img,.lb-img-full video{width:100%;display:block;border-radius:12px}
  .lb-img-row{display:flex;gap:8px;margin-bottom:8px}
  .lb-img-half{flex:1;min-width:0;border-radius:12px;overflow:hidden;background:#f0f0f0;position:relative}
  .lb-img-half img,.lb-img-half video{width:100%;display:block;border-radius:12px}
  .lb-images > :last-child{margin-bottom:0}

  .lb-img-full::before,.lb-img-half::before{
    content:'';position:absolute;top:50%;left:50%;
    width:24px;height:24px;margin:-12px 0 0 -12px;
    border:2px solid #ddd;border-top-color:#999;border-radius:50%;
    animation:lb-spin .7s linear infinite;z-index:1;
  }
  .lb-img-full.loaded::before,.lb-img-half.loaded::before{display:none}
  @keyframes lb-spin{to{transform:rotate(360deg)}}

  /* Yellow entry fade overlay — waits for .fade-out class to animate */
  .entry-fade{
    position:fixed;inset:0;z-index:999;background:#ebff3e;
    pointer-events:none;opacity:1;
    transition:opacity .6s cubic-bezier(.22,.61,.36,1);
  }
  .entry-fade.fade-out{opacity:0}

  @media(max-width:900px){
    .lb-content{flex-direction:column;width:90vw;max-height:90vh;align-items:stretch}
    .lb-info-wrapper{width:100%;max-width:none}
    .lb-info{max-height:30vh}
    .lb-images{max-height:55vh}
  }
  @media(max-width:600px){
    .lb-content{flex-direction:column;width:96vw;gap:12px}
    .lb-info-wrapper{width:100%;max-width:none}
    .lb-info{max-height:28vh}
    .lb-info-scroll{padding:20px 18px 0}
    .lb-images{max-height:50vh}
  }

  /* ── Mobile / Touch overrides ── */
  @media(pointer:coarse){
    .edge-fade{display:none}
    .cell-hover-img{display:none}
    .cell-thumb-wrap{display:none}
    .cell:hover{background:#e0e0e0}
    .cell:hover .cell-likes-pill{background:transparent;color:#aaa;box-shadow:none;padding:0}
    .cell.touch-active{background:#ebff3e !important;transition:background .25s ease}

    /* Lightbox mobile: gallery-first, full width */
    .lb-content{
      flex-direction:column-reverse !important;
      width:100vw !important;max-width:100vw !important;
      max-height:100vh !important;height:100vh;
      gap:0 !important;align-items:stretch !important;
      left:50% !important;top:0 !important;transform:translateX(-50%) !important;
    }
    .lb-images{
      flex:1 !important;max-height:none !important;
      border-radius:0 !important;box-shadow:none !important;
      padding:6px !important;padding-bottom:72px !important;
    }
    .lb-close{
      top:14px;right:14px;width:44px;height:44px;font-size:18px;
      box-shadow:0 4px 20px rgba(0,0,0,.15);z-index:210;
    }

    /* Info wrapper: hidden by default, shown as bottom sheet */
    .lb-info-wrapper{
      position:fixed !important;bottom:0;left:0;right:0;
      width:100% !important;max-width:100% !important;
      z-index:200;
      transform:translateY(100%);
      transition:transform .4s cubic-bezier(.22,.61,.36,1);
    }
    .lb-info-wrapper.sheet-open{
      transform:translateY(0);
    }
    .lb-info{
      border-radius:20px 20px 0 0 !important;
      max-height:60vh !important;
      box-shadow:0 -10px 40px rgba(0,0,0,.15) !important;
      opacity:1 !important;transform:none !important;
    }

    /* Info trigger button */
    .lb-info-trigger{
      position:fixed;bottom:16px;left:50%;transform:translateX(-50%);
      z-index:205;
      background:#ebff3e;color:#111;border:none;
      font-family:'Hanken Grotesk',sans-serif;font-weight:700;font-size:12px;
      letter-spacing:.5px;
      padding:12px 28px;border-radius:50px;
      box-shadow:0 6px 24px rgba(0,0,0,.12);
      cursor:pointer;
      opacity:0;pointer-events:none;
      transition:opacity .3s ease,transform .2s ease;
    }
    .lightbox-backdrop.open .lb-info-trigger{opacity:1;pointer-events:all}
    .lb-info-trigger:active{transform:translateX(-50%) scale(.95)}
    .lb-info-wrapper.sheet-open ~ .lb-info-trigger{opacity:0 !important;pointer-events:none !important}

    /* Sheet backdrop overlay */
    .lb-sheet-overlay{
      position:fixed;inset:0;z-index:199;
      background:rgba(0,0,0,.3);
      opacity:0;pointer-events:none;
      transition:opacity .3s ease;
    }
    .lb-sheet-overlay.visible{opacity:1;pointer-events:all}
  }
</style>
</head>
<body>
<div class="entry-fade" id="entryFade"></div>
<div class="viewport" id="viewport">
  <div class="edge-fade left"></div>
  <div class="edge-fade right"></div>
  <div class="grid" id="grid"></div>
</div>
<div class="lightbox-backdrop" id="lightboxBackdrop">
  <button class="lb-close" id="lightboxClose">&#x2715;</button>
  <div class="lb-content" id="lbContent">
    <!-- Wrapper stays in flex flow; .lb-info moves via transform when dragged -->
    <div class="lb-info-wrapper" id="lbInfoWrapper">
      <div class="lb-info" id="lbInfo">
        <div class="lb-info-scroll" id="lbInfoScroll"></div>
        <div class="lb-info-fade" id="lbInfoFade"></div>
      </div>
    </div>
    <div class="lb-images" id="lbImages"></div>
  </div>
  <div class="lb-sheet-overlay" id="lbSheetOverlay"></div>
  <button class="lb-info-trigger" id="lbInfoTrigger">INFO</button>
</div>
<script>
const _isTouch=('ontouchstart' in window)||(navigator.maxTouchPoints>0);
const SANITY_ID="ty87kenq",SANITY_DATASET="production";
const SANITY_CDN="https://"+SANITY_ID+".apicdn.sanity.io/v2024-01-01";

const GAP=5,BASE_COLS=10,COPIES=3,TOTAL_COLS=BASE_COLS*COPIES,ROWS=6;
const EDGE_ZONE=240,MAX_SPEED=5.5;
const COL_PEAK=3.5,ROW_PEAK=2.0,COL_FALLOFF=8,ROW_FALLOFF=8;
const ZOOM_MIN=0.62,ZOOM_MAX=1.0;
let zoom=_isTouch?0.62:0.72,zoomTarget=_isTouch?0.62:0.72;
const ZOOM_STEP=0.035,ZOOM_LERP=0.06,BASE_VISIBLE_ROWS=4.3;
let CELL_SIZE,GRID_W,GRID_H,CYCLE_W;
let offset,vel=0,mx=null,hovRow=-1,hovCol=-1,lightboxOpen=false;
const grid=document.getElementById("grid"),viewport=document.getElementById("viewport"),backdrop=document.getElementById("lightboxBackdrop");

window.addEventListener("mousemove",(e)=>{mx=e.clientX;});
document.addEventListener("mouseleave",()=>{mx=null;});
// Remove entry fade overlay after animation
document.getElementById("entryFade").addEventListener("transitionend",function(){this.remove();});

function calcDims(){const vh=window.innerHeight,vr=BASE_VISIBLE_ROWS*zoom;CELL_SIZE=(vh-(vr-1)*GAP)/vr;GRID_W=TOTAL_COLS*CELL_SIZE+(TOTAL_COLS-1)*GAP;GRID_H=ROWS*CELL_SIZE+(ROWS-1)*GAP;CYCLE_W=GRID_W/COPIES;}
function applySize(){grid.style.width=GRID_W+"px";grid.style.height=GRID_H+"px";grid.style.marginTop=-(GRID_H/2)+"px";}

// Entry animation uses boosted peaks for dramatic distortion
const ENTRY_COL_PEAK=6.0; // much bigger than normal 3.5
const ENTRY_ROW_PEAK=3.0; // bigger than normal 2.0
function computeColTemplateCustom(h,colPeak){if(h<0)return Array(TOTAL_COLS).fill("1fr").join(" ");const l=h%BASE_COLS,r=[];for(let i=0;i<TOTAL_COLS;i++){const li=i%BASE_COLS,dd=Math.abs(li-l),d=Math.min(dd,BASE_COLS-dd);if(d===0)r.push(colPeak);else if(d>=COL_FALLOFF)r.push(1);else{const t=1-d/COL_FALLOFF;r.push(1+(colPeak-1)*t*t);}}const s=r.reduce((a,b)=>a+b,0),sc=TOTAL_COLS/s;return r.map(w=>(w*sc).toFixed(4)+"fr").join(" ");}
function computeRowTemplateCustom(h,rowPeak){if(h<0)return Array(ROWS).fill("1fr").join(" ");const r=[];for(let i=0;i<ROWS;i++){const d=Math.abs(i-h);if(d===0)r.push(rowPeak);else if(d>=ROW_FALLOFF)r.push(1);else{const t=1-d/ROW_FALLOFF;r.push(1+(rowPeak-1)*t*t);}}const s=r.reduce((a,b)=>a+b,0),sc=ROWS/s;return r.map(w=>(w*sc).toFixed(4)+"fr").join(" ");}

function computeColTemplate(h){return computeColTemplateCustom(h,COL_PEAK);}
function computeRowTemplate(h){return computeRowTemplateCustom(h,ROW_PEAK);}
function setDefault(){grid.style.gridTemplateColumns=Array(TOTAL_COLS).fill("1fr").join(" ");grid.style.gridTemplateRows=Array(ROWS).fill("1fr").join(" ");}

const cellData=[];
for(let r=0;r<ROWS;r++){cellData[r]=[];for(let c=0;c<BASE_COLS;c++)cellData[r][c]={clickable:false,hasPage:false,name:"Name",showName:true,tag:"",likes:0,_id:null,thumbnailUrl:null,titleColor:null,titleHoverColor:null,gallery:[],credits:[],description:"",hoverType:"color",hoverColor:"#ebff3e",hoverImageUrl:null};}
function getCfg(r,c){return cellData[r%ROWS][((c%BASE_COLS)+BASE_COLS)%BASE_COLS];}

async function fetchProjects(){
  const q=encodeURIComponent('*[_type=="project"]{_id,title,slug,description,likes,gridRow,gridCol,tags,hasProjectPage,showName,hoverType,"hoverColor":hoverColor.hex,"titleColor":titleColor.hex,"titleHoverColor":titleHoverColor.hex,"thumbnailUrl":thumbnail.asset->url,"hoverImageUrl":hoverImage.asset->url,gallery[]{"_type":_type,layout,caption,"url":asset->url,"mimeType":asset->mimeType},credits[]{label,value,"url":link}}');
  try{const res=await fetch(SANITY_CDN+"/data/query/"+SANITY_DATASET+"?query="+q);const data=await res.json();return data.result||[];}catch(e){console.error("Sanity fetch error:",e);return[];}
}
function hasLiked(id){return localStorage.getItem("liked_"+id)==="1";}
function setLiked(id){localStorage.setItem("liked_"+id,"1");}
async function patchLike(id){try{await fetch("/api/like",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({id})});}catch(e){console.error("Like error:",e);}}

function buildGrid(){
  calcDims();applySize();setDefault();grid.innerHTML="";
  for(let r=0;r<ROWS;r++){for(let c=0;c<TOTAL_COLS;c++){
    const cfg=getCfg(r,c),cell=document.createElement("div");
    cell.dataset.row=r;cell.dataset.col=c;
    const isP=!!cfg._id,hasPage=cfg.hasPage;
    cell.className=hasPage?"cell clickable":"cell";

    if(isP){
      const hc=cfg.hoverColor||"#ebff3e";
      const thc=cfg.titleHoverColor||null;
      let nameEl=null;
      if(!_isTouch){
        cell.addEventListener("mouseenter",function(){
          this.style.background=hc;
          if(thc&&nameEl)nameEl.style.color=thc;
        });
        cell.addEventListener("mouseleave",function(){
          this.style.background="";
          if(nameEl)nameEl.style.color=cfg.titleColor||"";
        });
      }
      if(cfg.hoverType==="image"&&cfg.hoverImageUrl){
        const ov=document.createElement("div");ov.className="cell-hover-img";
        const oi=document.createElement("img");oi.src=cfg.hoverImageUrl;oi.alt="";
        ov.appendChild(oi);cell.appendChild(ov);
      }

      if(cfg.showName!==false){
        nameEl=document.createElement("div");nameEl.className="cell-top";
        if(cfg.titleColor)nameEl.style.color=cfg.titleColor;
        nameEl.textContent=cfg.name;cell.appendChild(nameEl);
      }
    } else {
      const top=document.createElement("div");top.className="cell-top";
      top.textContent="Name";cell.appendChild(top);
    }

    if(hasPage){
      if(cfg.thumbnailUrl){const tw=document.createElement("div");tw.className="cell-thumb-wrap";const im=document.createElement("img");im.src=cfg.thumbnailUrl;im.alt="";im.loading="lazy";tw.appendChild(im);cell.appendChild(tw);}
      const bot=document.createElement("div");bot.className="cell-bottom";
      const tag=document.createElement("div");tag.className="cell-tag";tag.textContent=cfg.tag;
      const lk=document.createElement("div");lk.className="cell-likes";
      const cnt=document.createElement("span");cnt.textContent=cfg.likes||0;
      const ht=document.createElement("span");ht.className="cell-heart";
      if(hasLiked(cfg._id)){ht.textContent="\u2665";ht.classList.add("liked");}else{ht.textContent="\u2661";}
      ht.addEventListener("click",(e)=>{e.stopPropagation();if(hasLiked(cfg._id))return;cfg.likes=(cfg.likes||0)+1;ht.textContent="\u2665";ht.classList.add("liked");cnt.textContent=cfg.likes;setLiked(cfg._id);patchLike(cfg._id);});
      lk.appendChild(cnt);lk.appendChild(ht);bot.appendChild(tag);bot.appendChild(lk);cell.appendChild(bot);
      if(!_isTouch) cell.addEventListener("click",()=>openLightbox(cfg));
    } else if(isP){
      // FIX 2: Non-page cells get pill + same bottom structure
      if(cfg.thumbnailUrl){const tw=document.createElement("div");tw.className="cell-thumb-wrap";const im=document.createElement("img");im.src=cfg.thumbnailUrl;im.alt="";im.loading="lazy";tw.appendChild(im);cell.appendChild(tw);}
      const bot=document.createElement("div");bot.className="cell-bottom";
      const sp=document.createElement("div"); // empty spacer for alignment
      const lk=document.createElement("div");lk.className="cell-likes cell-likes-pill";
      const cnt=document.createElement("span");cnt.textContent=cfg.likes||0;
      const ht=document.createElement("span");ht.className="cell-heart";
      if(hasLiked(cfg._id)){ht.textContent="\u2665";ht.classList.add("liked");}else{ht.textContent="\u2661";}
      ht.addEventListener("click",(e)=>{e.stopPropagation();if(hasLiked(cfg._id))return;cfg.likes=(cfg.likes||0)+1;ht.textContent="\u2665";ht.classList.add("liked");cnt.textContent=cfg.likes;setLiked(cfg._id);patchLike(cfg._id);});
      lk.appendChild(cnt);lk.appendChild(ht);bot.appendChild(sp);bot.appendChild(lk);cell.appendChild(bot);
    }
    grid.appendChild(cell);
  }}
}

function renderGallery(g){
  if(!g||!g.length)return '<div class="lb-img-full" style="aspect-ratio:16/9"></div>';
  let h="",i=0;
  while(i<g.length){const it=g[i],ly=it.layout||"full",iv=it._type==="galleryVideo"||(it.mimeType&&it.mimeType.startsWith("video"));
    if(ly==="half"){h+='<div class="lb-img-row">';h+=mTag(it,iv,"lb-img-half");if(i+1<g.length&&(g[i+1].layout||"full")==="half"){i++;const b=g[i],bv=b._type==="galleryVideo"||(b.mimeType&&b.mimeType.startsWith("video"));h+=mTag(b,bv,"lb-img-half");}h+='</div>';}
    else{h+=mTag(it,iv,"lb-img-full");}i++;}
  return h;
}
function mTag(it,iv,cls){
  let arStyle="";
  if(it.url){const m=it.url.match(/-(\d+)x(\d+)\./);if(m) arStyle=' style="aspect-ratio:'+m[1]+'/'+m[2]+'"';}
  if(!arStyle) arStyle=' style="aspect-ratio:16/9"';
  if(iv) return '<div class="'+cls+'"'+arStyle+'><video src="'+it.url+'" autoplay muted loop playsinline onloadeddata="this.parentElement.style.aspectRatio=\'\';this.parentElement.classList.add(\'loaded\')"></video></div>';
  return '<div class="'+cls+'"'+arStyle+'><img src="'+(it.url||"")+'" alt="'+(it.caption||"")+'" loading="lazy" onload="this.parentElement.style.aspectRatio=\'\';this.parentElement.classList.add(\'loaded\')"></div>';
}

function openLightbox(cfg){
  lightboxOpen=true;viewport.classList.add("blurred");backdrop.classList.add("open");
  const info=document.getElementById("lbInfo");
  const scroll=document.getElementById("lbInfoScroll");
  // Reset drag transform and maxHeight from previous lightbox
  dragOffsetX=0;dragOffsetY=0;
  info.style.transform="";info.style.maxHeight="";info.classList.remove("dragging");
  const lb=document.getElementById("lbImages");lb.scrollTop=0;lb.innerHTML=renderGallery(cfg.gallery);

  let cr="";
  if(cfg.credits&&cfg.credits.length){cr='<div class="lb-info-divider"></div>';cfg.credits.forEach(c=>{let v=c.value||"";if(c.url)v='<a href="'+c.url+'" target="_blank" rel="noopener">'+v+'</a>';cr+='<div class="lb-info-credit"><div class="lb-info-credit-label">'+(c.label||"")+'</div><div class="lb-info-credit-value">'+v+'</div></div>';});}

  scroll.innerHTML='<div class="lb-info-name">'+(cfg.title||cfg.name)+'</div>'+(cfg.description?'<div class="lb-info-desc">'+cfg.description+'</div>':'')+cr;
  scroll.scrollTop=0;

  // Set info height to 70% of gallery height + check fade
  requestAnimationFrame(()=>{requestAnimationFrame(()=>{
    const galH=lb.offsetHeight;
    if(galH>0) info.style.maxHeight=(galH*0.7)+"px";
    checkInfoFade();
  });});

  scroll.removeEventListener("scroll",checkInfoFade);
  scroll.addEventListener("scroll",checkInfoFade);
}

function checkInfoFade(){
  const scroll=document.getElementById("lbInfoScroll");
  const fade=document.getElementById("lbInfoFade");
  if(!scroll||!fade)return;
  const hasMore=scroll.scrollHeight - scroll.scrollTop - scroll.clientHeight > 2;
  if(hasMore) fade.classList.add("visible");
  else fade.classList.remove("visible");
}

function closeLightbox(){
  lightboxOpen=false;viewport.classList.remove("blurred");backdrop.classList.remove("open");
  const info=document.getElementById("lbInfo");
  dragOffsetX=0;dragOffsetY=0;
  info.style.transform="";info.classList.remove("dragging");
  // Don't remove maxHeight here — it would flash full height during fade-out
  // maxHeight gets reset in openLightbox before new content is set
  document.getElementById("lbInfoScroll").removeEventListener("scroll",checkInfoFade);
  document.querySelectorAll("#lbImages video").forEach(v=>v.pause());
}
document.getElementById("lightboxClose").addEventListener("click",closeLightbox);

// FIX 4: Only close on backdrop click, NOT on lbContent or lbInfo clicks
backdrop.addEventListener("click",(e)=>{
  // Only close if clicking the actual backdrop background
  if(e.target===backdrop) closeLightbox();
});

document.addEventListener("keydown",(e)=>{if(e.key==="Escape"&&lightboxOpen)closeLightbox();});

grid.addEventListener("mouseover",(e)=>{if(_isTouch||lightboxOpen)return;const cell=e.target.closest(".cell");if(!cell)return;const r=+cell.dataset.row,c=+cell.dataset.col;if(r===hovRow&&c===hovCol)return;hovRow=r;hovCol=c;grid.style.gridTemplateColumns=computeColTemplate(hovCol);grid.style.gridTemplateRows=computeRowTemplate(hovRow);});
grid.addEventListener("mouseleave",()=>{if(_isTouch)return;hovRow=-1;hovCol=-1;setDefault();});
window.addEventListener("wheel",(e)=>{if(_isTouch||lightboxOpen)return;e.preventDefault();if(e.deltaY>0)zoomTarget=Math.max(ZOOM_MIN,zoomTarget-ZOOM_STEP);else zoomTarget=Math.min(ZOOM_MAX,zoomTarget+ZOOM_STEP);},{passive:false});

calcDims();applySize();offset=-CYCLE_W;grid.style.transform="translateX("+offset+"px)";
window.addEventListener("resize",()=>{calcDims();applySize();offset=-CYCLE_W;grid.style.transform="translateX("+offset+"px)";});

// Entry animation
let entryAnim=true, entryVel=-30;
const ENTRY_FRICTION=0.975;
const ENTRY_STOP_THRESHOLD=0.12;
let entryHovCol=-1;
// Track the current entry distortion peaks so we can lerp them back smoothly
let currentEntryColPeak=ENTRY_COL_PEAK;
let currentEntryRowPeak=ENTRY_ROW_PEAK;

let isZooming=false;

(function tick(){
  if(!lightboxOpen){
    const pz=zoom;zoom+=(zoomTarget-zoom)*ZOOM_LERP;if(Math.abs(zoom-zoomTarget)<.0001)zoom=zoomTarget;

    // Zoom logic
    if(Math.abs(zoom-pz)>.0001){
      const oc=CYCLE_W;calcDims();applySize();offset=(offset/oc)*CYCLE_W;
      if(hovCol>=0){grid.style.gridTemplateColumns=computeColTemplate(hovCol);grid.style.gridTemplateRows=computeRowTemplate(hovRow);}
    }

    // Entry deceleration with strong aspect-ratio distortion
    if(entryAnim){
      entryVel*=ENTRY_FRICTION;
      offset+=entryVel;
      const speed=Math.abs(entryVel);

      if(speed>0.5){
        // Lerp peaks from ENTRY values all the way down to 1.0 (uniform grid)
        // so there's zero visual snap when setDefault() fires
        const speedNorm=Math.min(speed/20,1); // 0..1 based on speed
        currentEntryColPeak=1+(ENTRY_COL_PEAK-1)*speedNorm;
        currentEntryRowPeak=1+(ENTRY_ROW_PEAK-1)*speedNorm;

        const vw=window.innerWidth;
        const gridLeft=offset;
        const targetX=vw*0.6;
        const approxCol=Math.round((targetX-gridLeft)/(CELL_SIZE+GAP));
        const clampedCol=Math.max(0,Math.min(TOTAL_COLS-1,approxCol));
        if(clampedCol!==entryHovCol||true){ // always update as peaks change
          entryHovCol=clampedCol;
          grid.style.gridTemplateColumns=computeColTemplateCustom(entryHovCol,currentEntryColPeak);
          grid.style.gridTemplateRows=computeRowTemplateCustom(Math.floor(ROWS/2),currentEntryRowPeak);
        }
      }

      if(speed<ENTRY_STOP_THRESHOLD){
        entryAnim=false;
        entryHovCol=-1;
        setDefault();
      }
    }

    // Edge-based velocity
    const vw=window.innerWidth;let tv=0;
    if(mx!==null && !entryAnim){
      if(mx<EDGE_ZONE)tv=MAX_SPEED*Math.pow(1-mx/EDGE_ZONE,1.5);
      else if(mx>vw-EDGE_ZONE)tv=-MAX_SPEED*Math.pow(1-(vw-mx)/EDGE_ZONE,1.5);
    }
    if(!entryAnim){
      vel+=(tv-vel)*.03;if(Math.abs(vel)<.03)vel=0;
    }
    if(vel!==0||entryAnim||Math.abs(zoom-pz)>.0005){
      if(!entryAnim) offset+=vel;
      while(offset>-CYCLE_W*.5)offset-=CYCLE_W;
      while(offset<-CYCLE_W*1.5)offset+=CYCLE_W;
      grid.style.transform="translateX("+offset+"px)";
    }
  }
  requestAnimationFrame(tick);
})();

// FIX 4: Drag uses CSS transform on .lb-info — stays in flex flow, no layout break
let dragOffsetX=0,dragOffsetY=0;
(function(){
  const info=document.getElementById("lbInfo");
  let dr=false,sx,sy,baseX,baseY;

  info.addEventListener("mousedown",(e)=>{
    if(e.target.closest("a"))return;
    e.preventDefault();
    dr=true;
    sx=e.clientX;sy=e.clientY;
    baseX=dragOffsetX;baseY=dragOffsetY;
    info.classList.add("dragging");
  });

  window.addEventListener("mousemove",(e)=>{
    if(!dr)return;
    dragOffsetX=baseX+(e.clientX-sx);
    dragOffsetY=baseY+(e.clientY-sy);
    info.style.transform="translate("+dragOffsetX+"px,"+dragOffsetY+"px)";
  });

  window.addEventListener("mouseup",()=>{
    if(!dr)return;
    dr=false;
    info.classList.remove("dragging");
  });
})();

// ── Mobile / Touch Layer ──
const isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);

if(isTouchDevice){
  // Disable desktop mouse-edge scrolling on touch
  // (mx stays null, so edge velocity never triggers)

  // ── Touch Swipe with momentum ──
  let touchStartX=0, touchStartY=0, touchLastX=0, touchLastT=0;
  let touchDragging=false, touchVel=0;
  let touchStartOffset=0;
  const TOUCH_FRICTION=0.96;
  const TOUCH_STOP=0.3;
  let touchMomentum=false;

  // Distinguish tap from drag
  let touchMoved=false;
  const TAP_THRESHOLD=10;
  let touchStartCell=null;

  // ── Tap-to-expand state ──
  let expandedCell=null; // {row, col} of the currently expanded cell

  // ── Pinch to zoom ──
  let pinching=false, pinchStartDist=0, pinchStartZoom=0;

  function getTouchDist(e){
    const t=e.touches;
    return Math.hypot(t[1].clientX-t[0].clientX, t[1].clientY-t[0].clientY);
  }

  grid.addEventListener("touchstart",(e)=>{
    if(lightboxOpen) return;

    if(e.touches.length===2){
      // Start pinch
      pinching=true;
      pinchStartDist=getTouchDist(e);
      pinchStartZoom=zoomTarget;
      touchDragging=false;
      touchMomentum=false;
      return;
    }

    if(e.touches.length!==1) return;
    const t=e.touches[0];
    touchStartX=t.clientX;
    touchStartY=t.clientY;
    touchLastX=t.clientX;
    touchLastT=performance.now();
    touchStartOffset=offset;
    touchDragging=true;
    touchMomentum=false;
    touchMoved=false;
    touchVel=0;

    // Track which cell the touch started on
    const el=document.elementFromPoint(t.clientX,t.clientY);
    touchStartCell=el?el.closest(".cell"):null;
  },{passive:true});

  grid.addEventListener("touchmove",(e)=>{
    if(lightboxOpen) return;

    if(pinching && e.touches.length===2){
      e.preventDefault();
      const dist=getTouchDist(e);
      const scale=dist/pinchStartDist;
      zoomTarget=Math.max(ZOOM_MIN,Math.min(ZOOM_MAX, pinchStartZoom*scale));
      return;
    }

    if(!touchDragging||e.touches.length!==1) return;
    const t=e.touches[0];
    const dx=t.clientX-touchStartX;
    const dy=t.clientY-touchStartY;

    if(!touchMoved && Math.abs(dx)>TAP_THRESHOLD){
      touchMoved=true;
    }

    // Only hijack horizontal movement
    if(Math.abs(dx)>Math.abs(dy)){
      e.preventDefault();
    }

    const now=performance.now();
    const dt=now-touchLastT;
    if(dt>0) touchVel=(t.clientX-touchLastX)/(dt/16.67);
    touchLastX=t.clientX;
    touchLastT=now;

    offset=touchStartOffset+dx;
    // Wrap
    while(offset>-CYCLE_W*.5)offset-=CYCLE_W;
    while(offset<-CYCLE_W*1.5)offset+=CYCLE_W;
    grid.style.transform="translateX("+offset+"px)";
  },{passive:false});

  grid.addEventListener("touchend",(e)=>{
    if(pinching){
      if(e.touches.length<2) pinching=false;
      return;
    }

    if(!touchDragging) return;
    touchDragging=false;

    // If it was a tap (not a drag)
    if(!touchMoved && touchStartCell){
      handleCellTap(touchStartCell);
      return;
    }

    // Momentum
    if(Math.abs(touchVel)>0.5){
      touchMomentum=true;
      // touchVel is already set from touchmove
    }
  },{passive:true});

  // Momentum tick (runs inside the existing rAF loop)
  const origTick=window._mobileMomentumTick;
  // We'll inject into the main loop via a flag check
  // Instead, let's use a separate rAF for touch momentum
  (function touchTick(){
    if(touchMomentum && !lightboxOpen && !touchDragging){
      touchVel*=TOUCH_FRICTION;
      offset+=touchVel;
      while(offset>-CYCLE_W*.5)offset-=CYCLE_W;
      while(offset<-CYCLE_W*1.5)offset+=CYCLE_W;
      grid.style.transform="translateX("+offset+"px)";
      if(Math.abs(touchVel)<TOUCH_STOP) touchMomentum=false;
    }
    requestAnimationFrame(touchTick);
  })();

  // ── Tap-to-expand logic ──
  function handleCellTap(cellEl){
    const row=+cellEl.dataset.row;
    const col=+cellEl.dataset.col;
    const cfg=getCfg(row,col);

    // If tapping the already-expanded cell → open lightbox
    if(expandedCell && expandedCell.row===row && expandedCell.col%BASE_COLS===col%BASE_COLS){
      if(cfg.hasPage){
        collapseExpanded();
        openLightbox(cfg);
      }
      return;
    }

    // Collapse previous
    collapseExpanded();

    // Expand this cell
    expandedCell={row,col};
    cellEl.classList.add("touch-active");

    // Apply fish-eye centered on this cell
    grid.style.gridTemplateColumns=computeColTemplate(col);
    grid.style.gridTemplateRows=computeRowTemplate(row);

    // Apply hover color
    if(cfg._id){
      const hc=cfg.hoverColor||"#ebff3e";
      cellEl.style.background=hc;
    }
  }

  function collapseExpanded(){
    if(!expandedCell) return;
    // Remove touch-active from all cells
    document.querySelectorAll(".cell.touch-active").forEach(c=>{
      c.classList.remove("touch-active");
      c.style.background="";
    });
    expandedCell=null;
    setDefault();
  }

  // Tap anywhere else to collapse
  document.addEventListener("touchstart",(e)=>{
    if(lightboxOpen||!expandedCell) return;
    const cell=e.target.closest(".cell");
    if(!cell){
      collapseExpanded();
    }
  },{passive:true});

  // ── Mobile Lightbox: Info button & bottom sheet ──
  const infoTrigger=document.getElementById("lbInfoTrigger");
  const infoWrapper=document.getElementById("lbInfoWrapper");
  const sheetOverlay=document.getElementById("lbSheetOverlay");

  infoTrigger.addEventListener("click",(e)=>{
    e.stopPropagation();
    infoWrapper.classList.add("sheet-open");
    sheetOverlay.classList.add("visible");
  });

  sheetOverlay.addEventListener("click",()=>{
    infoWrapper.classList.remove("sheet-open");
    sheetOverlay.classList.remove("visible");
  });

  // Swipe-down to dismiss sheet
  let sheetTouchStartY=0, sheetTouchDragging=false;
  const infoEl=document.getElementById("lbInfo");

  infoEl.addEventListener("touchstart",(e)=>{
    if(!infoWrapper.classList.contains("sheet-open")) return;
    const scroll=document.getElementById("lbInfoScroll");
    // Only start drag-to-dismiss if scrolled to top
    if(scroll.scrollTop<=0){
      sheetTouchStartY=e.touches[0].clientY;
      sheetTouchDragging=true;
    }
  },{passive:true});

  infoEl.addEventListener("touchmove",(e)=>{
    if(!sheetTouchDragging) return;
    const dy=e.touches[0].clientY-sheetTouchStartY;
    if(dy>0){
      e.preventDefault();
      infoWrapper.style.transform="translateY("+dy+"px)";
    }
  },{passive:false});

  infoEl.addEventListener("touchend",(e)=>{
    if(!sheetTouchDragging) return;
    sheetTouchDragging=false;
    const dy=parseInt(infoWrapper.style.transform.replace(/[^0-9-]/g,'')||"0");
    if(dy>80){
      // Dismiss
      infoWrapper.classList.remove("sheet-open");
      sheetOverlay.classList.remove("visible");
    }
    infoWrapper.style.transform="";
  },{passive:true});

  // Override closeLightbox to also close sheet
  const _origClose=closeLightbox;
  closeLightbox=function(){
    infoWrapper.classList.remove("sheet-open");
    sheetOverlay.classList.remove("visible");
    infoWrapper.style.transform="";
    _origClose();
  };
  // Re-bind close button and backdrop
  document.getElementById("lightboxClose").removeEventListener("click",_origClose);
  document.getElementById("lightboxClose").addEventListener("click",closeLightbox);

  // Disable desktop hover distortion on touch — handled via _isTouch gate
}


(async function(){
  const projects=await fetchProjects();
  projects.forEach(p=>{const r=p.gridRow,c=p.gridCol;if(r==null||c==null||r<0||r>=ROWS||c<0||c>=BASE_COLS)return;
    const cell=cellData[r][c];cell._id=p._id;cell.hasPage=p.hasProjectPage!==false;cell.clickable=cell.hasPage;cell.title=p.title||"";cell.name=p.title||"";cell.showName=p.showName!==false;
    if(p.tags&&p.tags.length)cell.tag=p.tags.slice(0,2).map(t=>"#"+t).join("  ");
    cell.likes=p.likes||0;cell.thumbnailUrl=p.thumbnailUrl;cell.titleColor=p.titleColor||null;cell.titleHoverColor=p.titleHoverColor||null;cell.gallery=p.gallery||[];cell.credits=p.credits||[];cell.description=p.description||"";cell.hoverType=p.hoverType||"color";cell.hoverColor=p.hoverColor||"#ebff3e";cell.hoverImageUrl=p.hoverImageUrl||null;});
  buildGrid();
  offset=-CYCLE_W + 1200;
  entryAnim=true; entryVel=-30;
  grid.style.transform="translateX("+offset+"px)";
  // Reveal: fade out the yellow overlay now that grid is ready
  requestAnimationFrame(()=>{document.getElementById("entryFade")?.classList.add("fade-out");});})();
</script>
