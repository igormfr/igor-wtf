<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Portfolio Grid</title>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;background:#f5f5f5}
  .viewport{width:100vw;height:100vh;overflow:hidden;position:relative;transition:filter .5s cubic-bezier(.22,.61,.36,1)}
  .viewport.blurred{filter:blur(16px) brightness(.6);pointer-events:none}
  .edge-fade{position:absolute;top:0;width:90px;height:100%;z-index:10;pointer-events:none}
  .edge-fade.left{left:0;background:linear-gradient(to right,rgba(245,245,245,.65),transparent)}
  .edge-fade.right{right:0;background:linear-gradient(to left,rgba(245,245,245,.65),transparent)}
  .grid{display:grid;gap:5px;position:absolute;top:50%;will-change:transform;transition:grid-template-columns 1.1s cubic-bezier(.22,.61,.36,1),grid-template-rows 1.1s cubic-bezier(.22,.61,.36,1)}
  .cell{border-radius:10px;overflow:hidden;position:relative;background:#e0e0e0;min-width:0;min-height:0;display:flex;flex-direction:column;justify-content:space-between;padding:12px 15px;transition:background .5s ease}
  .cell:hover{background:#ebff3e}
  .cell.clickable{cursor:pointer}
  .cell:not(.clickable){cursor:default}
  .cell-hover-img{position:absolute;inset:0;opacity:0;transition:opacity .5s ease;pointer-events:none;z-index:1}
  .cell-hover-img img{width:100%;height:100%;object-fit:cover}
  .cell:hover .cell-hover-img{opacity:1}
  .cell-top{font-family:'Hanken Grotesk',sans-serif;font-weight:700;font-size:10px;color:#333;letter-spacing:.2px;overflow:hidden;text-overflow:ellipsis;flex-shrink:0;position:relative;z-index:2;white-space:pre-line;line-height:1.3}
  .cell-bottom{display:flex;justify-content:space-between;align-items:flex-end;flex-shrink:0;margin-top:auto;position:relative;z-index:2}
  .cell-tag{font-family:'Hanken Grotesk',sans-serif;font-weight:400;font-size:9px;color:#aaa;letter-spacing:.2px}
  .cell-likes{display:flex;align-items:center;gap:3px;font-family:'Hanken Grotesk',sans-serif;font-weight:400;font-size:9px;color:#aaa}
  .cell-likes-pill{background:transparent;border-radius:20px;padding:4px 8px;transition:background .3s ease,color .3s ease}
  .cell:hover .cell-likes-pill{background:#fff;color:#333;box-shadow:0 2px 8px rgba(0,0,0,.08)}
  .cell-heart{cursor:pointer;font-size:11px;line-height:1;transition:transform .2s ease,color .2s ease;user-select:none}
  .cell-heart:hover{transform:scale(1.3)}
  .cell-heart.liked{color:#ff3b5c}
  .cell-thumb-wrap{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(1.33);width:30%;aspect-ratio:1;opacity:0;transition:opacity .1s ease,transform .4s cubic-bezier(.22,.61,.36,1);pointer-events:none;z-index:2}
  .cell:hover .cell-thumb-wrap{opacity:1;transform:translate(-50%,-50%) scale(1);transition:opacity .3s ease,transform .7s cubic-bezier(.22,.61,.36,1)}
  .cell-thumb-wrap img{width:100%;height:100%;object-fit:cover;border-radius:5px;display:block}

  .lightbox-backdrop{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .45s cubic-bezier(.22,.61,.36,1);background:rgba(0,0,0,0)}
  .lightbox-backdrop.open{opacity:1;pointer-events:all;background:rgba(180,180,180,.35)}

  .lb-close{position:fixed;top:24px;right:24px;z-index:200;width:56px;height:56px;border-radius:50%;border:none;background:#fff;font-size:22px;font-weight:300;color:#000;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 30px rgba(0,0,0,.12);transition:background .2s,opacity .3s,transform .2s;opacity:0;pointer-events:none}
  .lightbox-backdrop.open .lb-close{opacity:1;pointer-events:all}
  .lb-close:hover{background:#ebff3e;transform:scale(1.05)}

  .lb-images{position:absolute;right:calc(50% - 340px);top:50%;transform:translateY(-50%);width:620px;max-width:55vw;max-height:85vh;background:#fff;border-radius:20px;overflow-y:auto;overflow-x:hidden;padding:8px;box-shadow:0 30px 100px rgba(0,0,0,.15);opacity:0;transform:translateY(-50%) scale(.94);transition:opacity .5s cubic-bezier(.22,.61,.36,1),transform .5s cubic-bezier(.22,.61,.36,1)}
  .lightbox-backdrop.open .lb-images{opacity:1;transform:translateY(-50%) scale(1)}
  .lb-images::-webkit-scrollbar{width:0}

  .lb-img-full{width:100%;border-radius:12px;margin-bottom:8px;background:#f0f0f0;overflow:hidden}
  .lb-img-full img,.lb-img-full video{width:100%;display:block;border-radius:12px}
  .lb-img-row{display:flex;gap:8px;margin-bottom:8px}
  .lb-img-half{flex:1;min-width:0;border-radius:12px;overflow:hidden;background:#f0f0f0}
  .lb-img-half img,.lb-img-half video{width:100%;display:block;border-radius:12px}
  .lb-images > :last-child{margin-bottom:0}

  .lb-info{position:absolute;left:calc(50% - 420px);top:50%;width:320px;max-width:40vw;max-height:76vh;background:#ebff3e;border-radius:16px;padding:28px 24px;overflow-y:auto;box-shadow:0 20px 80px rgba(0,0,0,.18);cursor:grab;user-select:none;z-index:150;opacity:0;transform:translateY(-50%) translateX(-30px) scale(.94);transition:opacity .5s cubic-bezier(.22,.61,.36,1) .08s,transform .5s cubic-bezier(.22,.61,.36,1) .08s}
  .lightbox-backdrop.open .lb-info{opacity:1;transform:translateY(-50%) translateX(0) scale(1)}
  .lb-info.dragging{cursor:grabbing;transition:none}
  .lb-info::-webkit-scrollbar{width:0}

  .lb-info-name{font-family:'Hanken Grotesk',sans-serif;font-weight:400;font-size:11px;color:#888;letter-spacing:.5px;margin-bottom:8px}
  .lb-info-desc{font-family:'Hanken Grotesk',sans-serif;font-weight:400;font-size:14px;line-height:1.4;color:#111;margin-bottom:16px}
  .lb-info-divider{width:100%;height:1px;background:#000;margin:20px 0}
  .lb-info-credit{margin-bottom:12px}
  .lb-info-credit-label{font-family:'Hanken Grotesk',sans-serif;font-weight:400;font-size:10px;color:#888;letter-spacing:.3px;margin-bottom:2px}
  .lb-info-credit-value{font-family:'Hanken Grotesk',sans-serif;font-weight:400;font-size:11px;color:#888;line-height:1.5}
  .lb-info-credit-value a{color:#888;text-decoration:underline;text-underline-offset:2px;transition:color .2s}
  .lb-info-credit-value a:hover{color:#111}

  @media(max-width:900px){.lb-images{right:5vw;width:55vw}.lb-info{left:5vw;width:35vw}}
  @media(max-width:600px){.lb-images{right:2vw;left:2vw;width:auto;top:52%;max-height:75vh}.lb-info{left:4vw;top:auto;bottom:5vh;transform:none;width:70vw}.lightbox-backdrop.open .lb-info{transform:none}}
</style>
</head>
<body>
<div class="viewport" id="viewport">
  <div class="edge-fade left"></div>
  <div class="edge-fade right"></div>
  <div class="grid" id="grid"></div>
</div>
<div class="lightbox-backdrop" id="lightboxBackdrop">
  <button class="lb-close" id="lightboxClose">&#x2715;</button>
  <div class="lb-images" id="lbImages"></div>
  <div class="lb-info" id="lbInfo"></div>
</div>
<script>
const SANITY_ID="ty87kenq",SANITY_DATASET="production";
const SANITY_CDN="https://"+SANITY_ID+".apicdn.sanity.io/v2024-01-01";

const GAP=5,BASE_COLS=10,COPIES=3,TOTAL_COLS=BASE_COLS*COPIES,ROWS=6;
const EDGE_ZONE=240,MAX_SPEED=5.5;
const COL_PEAK=3.5,ROW_PEAK=2.0,COL_FALLOFF=8,ROW_FALLOFF=8;
const ZOOM_MIN=0.62,ZOOM_MAX=1.0;
let zoom=0.72,zoomTarget=0.72;
const ZOOM_STEP=0.06,ZOOM_LERP=0.025,BASE_VISIBLE_ROWS=4.3;
let CELL_SIZE,GRID_W,GRID_H,CYCLE_W;
let offset,vel=0,mx=null,hovRow=-1,hovCol=-1,lightboxOpen=false;
const grid=document.getElementById("grid"),viewport=document.getElementById("viewport"),backdrop=document.getElementById("lightboxBackdrop");

function calcDims(){const vh=window.innerHeight,vr=BASE_VISIBLE_ROWS*zoom;CELL_SIZE=Math.round((vh-(vr-1)*GAP)/vr);GRID_W=TOTAL_COLS*CELL_SIZE+(TOTAL_COLS-1)*GAP;GRID_H=ROWS*CELL_SIZE+(ROWS-1)*GAP;CYCLE_W=GRID_W/COPIES;}
function applySize(){grid.style.width=GRID_W+"px";grid.style.height=GRID_H+"px";grid.style.marginTop=-(GRID_H/2)+"px";}
function computeColTemplate(h){if(h<0)return Array(TOTAL_COLS).fill("1fr").join(" ");const l=h%BASE_COLS,r=[];for(let i=0;i<TOTAL_COLS;i++){const li=i%BASE_COLS,dd=Math.abs(li-l),d=Math.min(dd,BASE_COLS-dd);if(d===0)r.push(COL_PEAK);else if(d>=COL_FALLOFF)r.push(1);else{const t=1-d/COL_FALLOFF;r.push(1+(COL_PEAK-1)*t*t);}}const s=r.reduce((a,b)=>a+b,0),sc=TOTAL_COLS/s;return r.map(w=>(w*sc).toFixed(4)+"fr").join(" ");}
function computeRowTemplate(h){if(h<0)return Array(ROWS).fill("1fr").join(" ");const r=[];for(let i=0;i<ROWS;i++){const d=Math.abs(i-h);if(d===0)r.push(ROW_PEAK);else if(d>=ROW_FALLOFF)r.push(1);else{const t=1-d/ROW_FALLOFF;r.push(1+(ROW_PEAK-1)*t*t);}}const s=r.reduce((a,b)=>a+b,0),sc=ROWS/s;return r.map(w=>(w*sc).toFixed(4)+"fr").join(" ");}
function setDefault(){grid.style.gridTemplateColumns=Array(TOTAL_COLS).fill("1fr").join(" ");grid.style.gridTemplateRows=Array(ROWS).fill("1fr").join(" ");}

const cellData=[];
for(let r=0;r<ROWS;r++){cellData[r]=[];for(let c=0;c<BASE_COLS;c++)cellData[r][c]={clickable:false,hasPage:false,name:"Name",showName:true,tag:"",likes:0,_id:null,thumbnailUrl:null,titleColor:null,titleHoverColor:null,gallery:[],credits:[],description:"",hoverType:"color",hoverColor:"#ebff3e",hoverImageUrl:null};}
function getCfg(r,c){return cellData[r%ROWS][((c%BASE_COLS)+BASE_COLS)%BASE_COLS];}

async function fetchProjects(){
  const q=encodeURIComponent('*[_type=="project"]{_id,title,slug,description,likes,gridRow,gridCol,tags,hasProjectPage,showName,hoverType,"hoverColor":hoverColor.hex,"titleColor":titleColor.hex,"titleHoverColor":titleHoverColor.hex,"thumbnailUrl":thumbnail.asset->url,"hoverImageUrl":hoverImage.asset->url,gallery[]{"_type":_type,layout,caption,"url":asset->url,"mimeType":asset->mimeType},credits[]{label,value,"url":link}}');
  try{const res=await fetch(SANITY_CDN+"/data/query/"+SANITY_DATASET+"?query="+q);const data=await res.json();return data.result||[];}catch(e){console.error("Sanity fetch error:",e);return[];}
}
function hasLiked(id){return localStorage.getItem("liked_"+id)==="1";}
function setLiked(id){localStorage.setItem("liked_"+id,"1");}
async function patchLike(id){try{await fetch("/api/like",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({id})});}catch(e){console.error("Like error:",e);}}

function buildGrid(){
  calcDims();applySize();setDefault();grid.innerHTML="";
  for(let r=0;r<ROWS;r++){for(let c=0;c<TOTAL_COLS;c++){
    const cfg=getCfg(r,c),cell=document.createElement("div");
    cell.dataset.row=r;cell.dataset.col=c;
    const isP=!!cfg._id,hasPage=cfg.hasPage;
    cell.className=hasPage?"cell clickable":"cell";

    // Custom hover color + title hover color for all Sanity cells
    if(isP){
      const hc=cfg.hoverColor||"#ebff3e";
      const thc=cfg.titleHoverColor||null;
      let nameEl=null;
      cell.addEventListener("mouseenter",function(){
        this.style.background=hc;
        if(thc&&nameEl)nameEl.style.color=thc;
      });
      cell.addEventListener("mouseleave",function(){
        this.style.background="";
        if(nameEl)nameEl.style.color=cfg.titleColor||"";
      });
      if(cfg.hoverType==="image"&&cfg.hoverImageUrl){
        const ov=document.createElement("div");ov.className="cell-hover-img";
        const oi=document.createElement("img");oi.src=cfg.hoverImageUrl;oi.alt="";
        ov.appendChild(oi);cell.appendChild(ov);
      }

      // Name
      if(cfg.showName!==false){
        nameEl=document.createElement("div");nameEl.className="cell-top";
        if(cfg.titleColor)nameEl.style.color=cfg.titleColor;
        nameEl.textContent=cfg.name;cell.appendChild(nameEl);
      }
    } else {
      // Empty cell (no Sanity data) — just name
      const top=document.createElement("div");top.className="cell-top";
      top.textContent="Name";cell.appendChild(top);
    }

    if(hasPage){
      // Thumbnail
      if(cfg.thumbnailUrl){const tw=document.createElement("div");tw.className="cell-thumb-wrap";const im=document.createElement("img");im.src=cfg.thumbnailUrl;im.alt="";im.loading="lazy";tw.appendChild(im);cell.appendChild(tw);}
      // Bottom: tags + likes
      const bot=document.createElement("div");bot.className="cell-bottom";
      const tag=document.createElement("div");tag.className="cell-tag";tag.textContent=cfg.tag;
      const lk=document.createElement("div");lk.className="cell-likes";
      const cnt=document.createElement("span");cnt.textContent=cfg.likes||0;
      const ht=document.createElement("span");ht.className="cell-heart";
      if(hasLiked(cfg._id)){ht.textContent="\u2665";ht.classList.add("liked");}else{ht.textContent="\u2661";}
      ht.addEventListener("click",(e)=>{e.stopPropagation();if(hasLiked(cfg._id))return;cfg.likes=(cfg.likes||0)+1;ht.textContent="\u2665";ht.classList.add("liked");cnt.textContent=cfg.likes;setLiked(cfg._id);patchLike(cfg._id);});
      lk.appendChild(cnt);lk.appendChild(ht);bot.appendChild(tag);bot.appendChild(lk);cell.appendChild(bot);
      cell.addEventListener("click",()=>openLightbox(cfg));
    } else if(isP){
      // Non-page: thumbnail + likes with pill, no tags
      if(cfg.thumbnailUrl){const tw=document.createElement("div");tw.className="cell-thumb-wrap";const im=document.createElement("img");im.src=cfg.thumbnailUrl;im.alt="";im.loading="lazy";tw.appendChild(im);cell.appendChild(tw);}
      const bot=document.createElement("div");bot.className="cell-bottom";
      const sp=document.createElement("div");
      const lk=document.createElement("div");lk.className="cell-likes cell-likes-pill";
      const cnt=document.createElement("span");cnt.textContent=cfg.likes||0;
      const ht=document.createElement("span");ht.className="cell-heart";
      if(hasLiked(cfg._id)){ht.textContent="\u2665";ht.classList.add("liked");}else{ht.textContent="\u2661";}
      ht.addEventListener("click",(e)=>{e.stopPropagation();if(hasLiked(cfg._id))return;cfg.likes=(cfg.likes||0)+1;ht.textContent="\u2665";ht.classList.add("liked");cnt.textContent=cfg.likes;setLiked(cfg._id);patchLike(cfg._id);});
      lk.appendChild(cnt);lk.appendChild(ht);bot.appendChild(sp);bot.appendChild(lk);cell.appendChild(bot);
    }
    grid.appendChild(cell);
  }}
}

function renderGallery(g){
  if(!g||!g.length)return '<div class="lb-img-full" style="aspect-ratio:16/9"></div>';
  let h="",i=0;
  while(i<g.length){const it=g[i],ly=it.layout||"full",iv=it._type==="galleryVideo"||(it.mimeType&&it.mimeType.startsWith("video"));
    if(ly==="half"){h+='<div class="lb-img-row">';h+=mTag(it,iv,"lb-img-half");if(i+1<g.length&&(g[i+1].layout||"full")==="half"){i++;const b=g[i],bv=b._type==="galleryVideo"||(b.mimeType&&b.mimeType.startsWith("video"));h+=mTag(b,bv,"lb-img-half");}h+='</div>';}
    else{h+=mTag(it,iv,"lb-img-full");}i++;}
  return h;
}
function mTag(it,iv,cls){if(iv)return '<div class="'+cls+'"><video src="'+it.url+'" autoplay muted loop playsinline></video></div>';return '<div class="'+cls+'"><img src="'+(it.url||"")+'" alt="'+(it.caption||"")+'" loading="lazy"></div>';}

function openLightbox(cfg){
  lightboxOpen=true;viewport.classList.add("blurred");backdrop.classList.add("open");
  const info=document.getElementById("lbInfo");
  info.style.left="";info.style.top="";info.style.right="";info.style.bottom="";info.style.transform="";info.classList.remove("dragging");
  const lb=document.getElementById("lbImages");lb.scrollTop=0;lb.innerHTML=renderGallery(cfg.gallery);
  let cr="";
  if(cfg.credits&&cfg.credits.length){cr='<div class="lb-info-divider"></div>';cfg.credits.forEach(c=>{let v=c.value||"";if(c.url)v='<a href="'+c.url+'" target="_blank" rel="noopener">'+v+'</a>';cr+='<div class="lb-info-credit"><div class="lb-info-credit-label">'+(c.label||"")+'</div><div class="lb-info-credit-value">'+v+'</div></div>';});}
  info.innerHTML='<div class="lb-info-name">'+(cfg.title||cfg.name)+'</div>'+(cfg.description?'<div class="lb-info-desc">'+cfg.description+'</div>':'')+cr;
}
function closeLightbox(){lightboxOpen=false;viewport.classList.remove("blurred");backdrop.classList.remove("open");document.getElementById("lbInfo").style.left="";document.getElementById("lbInfo").style.top="";document.querySelectorAll("#lbImages video").forEach(v=>v.pause());}
document.getElementById("lightboxClose").addEventListener("click",closeLightbox);
backdrop.addEventListener("click",(e)=>{if(e.target===backdrop)closeLightbox();});
document.addEventListener("keydown",(e)=>{if(e.key==="Escape"&&lightboxOpen)closeLightbox();});

grid.addEventListener("mouseover",(e)=>{if(lightboxOpen)return;const cell=e.target.closest(".cell");if(!cell)return;const r=+cell.dataset.row,c=+cell.dataset.col;if(r===hovRow&&c===hovCol)return;hovRow=r;hovCol=c;grid.style.gridTemplateColumns=computeColTemplate(hovCol);grid.style.gridTemplateRows=computeRowTemplate(hovRow);});
grid.addEventListener("mouseleave",()=>{hovRow=-1;hovCol=-1;setDefault();});
window.addEventListener("wheel",(e)=>{if(lightboxOpen)return;e.preventDefault();if(e.deltaY>0)zoomTarget=Math.max(ZOOM_MIN,zoomTarget-ZOOM_STEP);else zoomTarget=Math.min(ZOOM_MAX,zoomTarget+ZOOM_STEP);},{passive:false});

calcDims();applySize();offset=-CYCLE_W;grid.style.transform="translateX("+offset+"px)";
window.addEventListener("mousemove",(e)=>{mx=e.clientX;});
document.addEventListener("mouseleave",()=>{mx=null;});
window.addEventListener("resize",()=>{calcDims();applySize();offset=-CYCLE_W;grid.style.transform="translateX("+offset+"px)";});

(function tick(){
  if(!lightboxOpen){const pz=zoom;zoom+=(zoomTarget-zoom)*ZOOM_LERP;if(Math.abs(zoom-zoomTarget)<.001)zoom=zoomTarget;if(Math.abs(zoom-pz)>.0005){const oc=CYCLE_W;calcDims();applySize();offset=(offset/oc)*CYCLE_W;if(hovCol>=0){grid.style.gridTemplateColumns=computeColTemplate(hovCol);grid.style.gridTemplateRows=computeRowTemplate(hovRow);}}
  const vw=window.innerWidth;let tv=0;if(mx!==null){if(mx<EDGE_ZONE)tv=MAX_SPEED*Math.pow(1-mx/EDGE_ZONE,1.5);else if(mx>vw-EDGE_ZONE)tv=-MAX_SPEED*Math.pow(1-(vw-mx)/EDGE_ZONE,1.5);}vel+=(tv-vel)*.03;if(Math.abs(vel)<.03)vel=0;if(vel!==0||Math.abs(zoom-pz)>.0005){offset+=vel;while(offset>-CYCLE_W*.5)offset-=CYCLE_W;while(offset<-CYCLE_W*1.5)offset+=CYCLE_W;grid.style.transform="translateX("+offset+"px)";}}
  requestAnimationFrame(tick);
})();

(function(){const info=document.getElementById("lbInfo");let dr=false,sx,sy,ox,oy;
info.addEventListener("mousedown",(e)=>{if(e.target.closest("a"))return;dr=true;info.classList.add("dragging");const r=info.getBoundingClientRect();ox=r.left;oy=r.top;sx=e.clientX;sy=e.clientY;e.preventDefault();});
window.addEventListener("mousemove",(e)=>{if(!dr)return;info.style.left=(ox+e.clientX-sx)+"px";info.style.top=(oy+e.clientY-sy)+"px";info.style.transform="none";info.style.right="auto";info.style.bottom="auto";});
window.addEventListener("mouseup",()=>{if(!dr)return;dr=false;info.classList.remove("dragging");});})();

(async function(){
  const projects=await fetchProjects();
  projects.forEach(p=>{const r=p.gridRow,c=p.gridCol;if(r==null||c==null||r<0||r>=ROWS||c<0||c>=BASE_COLS)return;
    const cell=cellData[r][c];cell._id=p._id;cell.hasPage=p.hasProjectPage!==false;cell.clickable=cell.hasPage;cell.title=p.title||"";cell.name=p.title||"";cell.showName=p.showName!==false;
    if(p.tags&&p.tags.length)cell.tag=p.tags.slice(0,2).map(t=>"#"+t).join("  ");
    cell.likes=p.likes||0;cell.thumbnailUrl=p.thumbnailUrl;cell.titleColor=p.titleColor||null;cell.titleHoverColor=p.titleHoverColor||null;cell.gallery=p.gallery||[];cell.credits=p.credits||[];cell.description=p.description||"";cell.hoverType=p.hoverType||"color";cell.hoverColor=p.hoverColor||"#ebff3e";cell.hoverImageUrl=p.hoverImageUrl||null;});
  buildGrid();offset=-CYCLE_W;grid.style.transform="translateX("+offset+"px)";
})();
</script>
</body>
</html>
